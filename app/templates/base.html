<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BookForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">BookForge</a>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/upload">Upload</a>
        <a href="/voices">Voices</a>
        <a href="/mimika">Mimika</a>
        <a href="/settings">Settings</a>
        <form class="nav-form" action="/logout" method="post"><button type="submit">Logout</button></form>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
